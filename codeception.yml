namespace: App\Tests
support_namespace: Support
paths:
    tests: tests
    output: build/codeception
    data: tests/Support/Data
    support: tests/Support
    envs: tests/_envs
actor_suffix: Tester
extensions:
    enabled:
        - Codeception\Extension\RunFailed
params:
    - .env
    - .env.test
settings:
    shuffle: true
    colors: true
    report_useless_tests: true

coverage:
    enabled: false
